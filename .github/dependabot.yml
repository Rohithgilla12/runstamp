version: 2

# Expo SDK pins react, react-native and every expo-* native module to exact
# versions per SDK release. Letting Dependabot bump those silently breaks the
# native runtime alignment (e.g. react-native 0.81 -> 0.85 under SDK 54), so the
# npm blocks below ignore them. Upgrade those via `expo install` / an SDK bump.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"

  # No separate /apps/mobile npm block: this is a pnpm workspace with a single
  # root lockfile, so the directory:/ config above already covers every package
  # (mobile, landing, marketing) AND updates pnpm-lock.yaml. A per-app block here
  # produces package.json-only PRs that fail --frozen-lockfile in CI.

  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
