<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RunStamp — post-run companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#f3ede2;
    --paper-2:#ebe3d3;
    --ink:#14110d;
    --ink-2:#3a342b;
    --ink-3:#75695a;
    --line:rgba(20,17,13,0.10);
    --line-2:rgba(20,17,13,0.06);
    --solar:#e85d2f;
    --solar-deep:#c44a1e;
    --moss:#4a6b3a;
    --sky:#3c6e8c;
    --warn:#c0833a;

    /* dark */
    --d-paper:#0e0d0b;
    --d-paper-2:#1a1714;
    --d-ink:#f3ede2;
    --d-ink-2:#c9c0b1;
    --d-ink-3:#8a8170;
    --d-line:rgba(243,237,226,0.12);
    --d-line-2:rgba(243,237,226,0.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#28241e;color:var(--ink);
    font-family:'Geist',-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
    min-height:100vh;overflow-x:hidden;
  }
  body{
    background:
      radial-gradient(1200px 700px at 20% 0%, #38322a 0%, transparent 60%),
      radial-gradient(900px 600px at 80% 100%, #2a241d 0%, transparent 60%),
      #1d1a16;
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;
  }
  #root{display:flex;align-items:center;justify-content:center}
  /* hide scrollbars inside phone */
  .hideScroll::-webkit-scrollbar{display:none}
  .hideScroll{scrollbar-width:none}
  /* tappable */
  .tap{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  .tap:active{opacity:0.65}

  /* mono numerals */
  .mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-feature-settings:"tnum" 1,"zero" 1}
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
  .display{font-family:'Instrument Serif',Georgia,serif;font-weight:400;letter-spacing:-0.01em}
  .eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500}

  /* paper grain noise */
  .grain{position:relative}
  .grain::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, rgba(20,17,13,0.018) 0 1px, transparent 1px 2px),
      radial-gradient(circle at 20% 30%, rgba(20,17,13,0.025), transparent 50%);
    mix-blend-mode:multiply;
  }

  /* keyframes */
  @keyframes pulse-solar { 0%,100%{box-shadow:0 0 0 0 rgba(232,93,47,0.45)} 70%{box-shadow:0 0 0 14px rgba(232,93,47,0)} }
  @keyframes heliosRise { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:none} }
  @keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:200px 0} }
  @keyframes draw { to { stroke-dashoffset: 0 } }
  @keyframes spin { to { transform: rotate(360deg) } }

  .rise{opacity:1}
</style>

<!-- Speaker notes are not used here, this is an interactive prototype -->

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<script type="text/babel" src="screen-activity.jsx"></script>
<script type="text/babel" src="screen-editor.jsx"></script>
<script type="text/babel" src="screen-analytics.jsx"></script>

<script type="text/babel" src="screen-settings.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
