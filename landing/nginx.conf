# Runstamp marketing + legal landing.
# Serves index.html / privacy.html / terms.html with clean URLs:
#   /                  → index.html
#   /privacy           → privacy.html
#   /terms             → terms.html
# Behind a Cloudflare Tunnel, so we listen on plain HTTP inside the container.

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively (cloudflare-edge cached too)
  location ~* \.(png|svg|ico|jpg|jpeg|webp|woff2?)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
  }

  # Pretty URLs — strip trailing slash, fall back to .html, then 404
  location / {
    try_files $uri $uri.html $uri/index.html =404;
  }

  # The legal pages, with explicit aliases so /privacy and /terms work without .html
  location = /privacy { try_files /privacy.html =404; }
  location = /terms   { try_files /terms.html =404; }

  # Lightweight health endpoint for monitoring
  location = /landing-healthz {
    return 200 'ok\n';
    add_header Content-Type text/plain;
  }

  # Apple's universal-link verification file (well-known/apple-app-site-association).
  # When we wire associated domains for /run/share or /u/<handle> deep links, drop
  # the JSON here and remove this 404. Until then 404 is correct.
  location = /.well-known/apple-app-site-association { return 404; }

  # Hide nginx version from Server: header
  server_tokens off;
}
