  <circle cx="980" cy="180" r="110" fill="none" stroke="#14110d" stroke-width="2.5" opacity="0.18"/>
  <circle cx="980" cy="180" r="90" fill="none" stroke="#14110d" stroke-width="1" opacity="0.12"/>
  <text x="980" y="155" font-family="monospace" font-size="11" letter-spacing="4" text-anchor="middle" fill="#14110d" opacity="0.35">RUNSTAMP · 2026</text>
