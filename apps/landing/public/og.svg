  <text x="120" y="118" font-family="monospace" font-size="11" letter-spacing="5" fill="#14110d" opacity="0.5">OPEN BETA · 2026</text>

  <!-- Main headline -->
  <text x="120" y="230" font-family="Georgia, serif" font-size="88" font-style="italic" fill="#14110d" letter-spacing="-2">Collect a stamp</text>
  <text x="120" y="328" font-family="Georgia, serif" font-size="88" font-style="italic" fill="#14110d" letter-spacing="-2">for every run.</text>

  <!-- Sub headline -->
  <text x="120" y="400" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#14110d" opacity="0.6">Turn your Strava runs into postcards, analytics, and a passport of cities.</text>

  <!-- Solar accent bar -->
  <rect x="120" y="440" width="64" height="4" fill="#e85d2f" rx="2"/>

  <!-- Stats row -->
  <text x="120" y="490" font-family="monospace" font-size="13" letter-spacing="2" fill="#14110d" opacity="0.45">SHARE CARDS  ·  STAMP CATALOGUE  ·  PLACES PASSPORT  ·  FREE &amp; OPEN SOURCE</text>

