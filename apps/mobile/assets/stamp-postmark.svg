<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88">
  <g transform="rotate(-8 44 44)">
    <!-- Three concentric rings (variable stroke weight, like a real cancellation) -->
    <circle cx="44" cy="44" r="38" fill="none" stroke="currentColor" stroke-width="2.2"/>
    <circle cx="44" cy="44" r="32" fill="none" stroke="currentColor" stroke-width="1"/>
    <circle cx="44" cy="44" r="14" fill="none" stroke="currentColor" stroke-width="1.4"/>

    <!-- Central sun glyph (5-axis radiating star — matches Runstamp brand) -->
    <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <line x1="44" y1="32" x2="44" y2="38"/>
      <line x1="44" y1="50" x2="44" y2="56"/>
      <line x1="32" y1="44" x2="38" y2="44"/>
      <line x1="50" y1="44" x2="56" y2="44"/>
      <line x1="34.5" y1="34.5" x2="38.5" y2="38.5"/>
      <line x1="49.5" y1="49.5" x2="53.5" y2="53.5"/>
      <line x1="34.5" y1="53.5" x2="38.5" y2="49.5"/>
      <line x1="49.5" y1="38.5" x2="53.5" y2="34.5"/>
    </g>
    <circle cx="44" cy="44" r="2.5" fill="currentColor"/>

    <!-- Ink-bleed splotches outside the outer ring — the "stamp didn't land flat" character -->
    <g fill="currentColor">
      <circle cx="6" cy="32" r="1.2"/>
      <circle cx="4" cy="48" r="0.9"/>
      <circle cx="10" cy="62" r="0.7"/>
      <circle cx="82" cy="28" r="1.3"/>
      <circle cx="84" cy="56" r="1"/>
      <circle cx="58" cy="84" r="1.1"/>
      <circle cx="36" cy="86" r="0.8"/>
      <circle cx="78" cy="74" r="0.6"/>
    </g>
  </g>
</svg>
