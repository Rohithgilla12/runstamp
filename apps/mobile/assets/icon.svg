<?xml version="1.0" encoding="UTF-8"?>
<!--
  Runstamp app icon — circular postmark per PRD §8.
  Square cream canvas (1024×1024). Centered postmark circle ~80% diameter.
  RUNSTAMP curves the upper rim; the year arcs the lower rim. The two-letter
  "RS" mono monogram dominates so the icon stays recognizable at 48×48.
  Solar accent (#e85d2f) ink on paper (#f3ede2) — the brand palette.
  Intentional irregular dasharray on the outer rim reads as "hand-stamped"
  wear instead of vector-perfect.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Curved baselines for the rim text. Inner radius slightly smaller
         than the inner ring so the glyphs sit comfortably inside. -->
    <path id="rim-top"    d="M 512 92  a 420 420 0 0 1 0 840  a 420 420 0 0 1 0 -840" />
    <path id="rim-bottom" d="M 512 932 a 420 420 0 0 0 0 -840 a 420 420 0 0 0 0  840" />
  </defs>

  <!-- Paper canvas. iOS clips to a rounded square; Android adaptive icons
       crop this to their own mask. We fill the whole canvas so neither
       chops content. -->
  <rect width="1024" height="1024" fill="#f3ede2" />

  <!-- Subtle paper grain — a faint radial darken at the corners. Implemented
       with a radial gradient on a paper rect just inside the canvas. -->
  <defs>
    <radialGradient id="paper-grain" cx="50%" cy="50%" r="65%">
      <stop offset="60%" stop-color="#f3ede2" stop-opacity="0" />
      <stop offset="100%" stop-color="#14110d" stop-opacity="0.06" />
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#paper-grain)" />

  <!-- Outer postmark ring — solar with intentional gaps. Stroke-dasharray
       uses irregular lengths so the wear pattern doesn't look mechanical. -->
  <circle cx="512" cy="512" r="460"
          fill="none" stroke="#e85d2f" stroke-width="10"
          stroke-dasharray="220 14 180 8 280 12 160 10 240 16" />

  <!-- Inner ring — solid, thinner, holds the text band. -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#e85d2f" stroke-width="6" />

  <!-- Inside the inner ring, a soft paper fill so the monogram has its
       own ground. Slightly warmer than the canvas. -->
  <circle cx="512" cy="512" r="424" fill="#ece5d6" />

  <!-- Innermost detail ring — tiny dashed, suggests the date-stamp inner. -->
  <circle cx="512" cy="512" r="276" fill="none" stroke="#e85d2f" stroke-width="3" stroke-dasharray="6 6" opacity="0.65" />

  <!-- RUNSTAMP curving along the top rim. JetBrains Mono falls back to
       any monospace at render time. -->
  <text fill="#e85d2f" font-family="JetBrainsMono-Bold, 'JetBrains Mono', ui-monospace, monospace"
        font-size="62" font-weight="700" letter-spacing="22">
    <textPath href="#rim-top" startOffset="50%" text-anchor="middle">RUNSTAMP</textPath>
  </text>

  <!-- Year curving along the bottom rim. EST · year reads as the postmark
       date the way real philatelic cancellations do. -->
  <text fill="#e85d2f" font-family="JetBrainsMono-Bold, 'JetBrains Mono', ui-monospace, monospace"
        font-size="46" font-weight="700" letter-spacing="14">
    <textPath href="#rim-bottom" startOffset="50%" text-anchor="middle">EST · 2026</textPath>
  </text>

  <!-- Two short horizontal hash marks flanking the monogram — the "cancel
       bars" you see on real postmarks. -->
  <line x1="180" y1="512" x2="290" y2="512" stroke="#e85d2f" stroke-width="8" stroke-linecap="round" opacity="0.85" />
  <line x1="734" y1="512" x2="844" y2="512" stroke="#e85d2f" stroke-width="8" stroke-linecap="round" opacity="0.85" />

  <!-- The monogram: solid ink slab with "RS" in cream. Dominates so the
       icon survives down to 48×48. -->
  <rect x="316" y="382" width="392" height="260" rx="18" fill="#14110d" />
  <text x="512" y="592" fill="#f3ede2" font-family="JetBrainsMono-Bold, 'JetBrains Mono', ui-monospace, monospace"
        font-size="220" font-weight="800" text-anchor="middle" letter-spacing="-6">RS</text>

  <!-- Faint ink-bleed smudges below the monogram for hand-stamped character.
       Three irregular dots, low opacity, just outside the slab. -->
  <circle cx="316" cy="660" r="4" fill="#14110d" opacity="0.35" />
  <circle cx="338" cy="676" r="2.4" fill="#14110d" opacity="0.25" />
  <circle cx="700" cy="664" r="3" fill="#14110d" opacity="0.30" />
</svg>
