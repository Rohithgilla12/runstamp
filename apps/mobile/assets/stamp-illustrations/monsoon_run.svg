<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="shadow" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dense diagonal monsoon rain in background -->
    <path d="M 20 10 L 10 30 M 40 5 L 20 45 M 60 15 L 45 45 M 80 5 L 60 45 M 120 5 L 100 45 M 140 10 L 125 40 M 160 5 L 140 45 M 180 15 L 165 45 M 190 5 L 180 25" stroke-width="1"/>
    <path d="M 10 70 L 5 80 M 185 70 L 175 90 M 15 150 L 5 170 M 190 130 L 180 150" stroke-width="1"/>
    
    <!-- Puddles / ground reflections -->
    <ellipse cx="100" cy="188" rx="60" ry="4" stroke-width="1.2"/>
    <path d="M 50 194 L 150 194 M 70 198 L 130 198" stroke-width="1"/>
  </g>

  <g id="ink" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="6" y1="184" x2="194" y2="184"/>
    
    <!-- Massive organic banyan trunk -->
    <path d="M 80 184 Q 75 140 90 90 Q 70 120 70 184"/>
    <path d="M 120 184 Q 125 140 110 90 Q 130 120 130 184"/>
    <path d="M 90 184 Q 95 150 100 90"/>
    <path d="M 110 184 Q 105 150 100 90"/>
    
    <!-- Dense bark hatching -->
    <path d="M 85 180 Q 82 140 94 100 M 115 180 Q 118 140 106 100 M 95 180 L 98 120 M 105 180 L 102 120" stroke-width="1.2"/>

    <!-- Organic, rugged canopy composed of many overlapping cloudy/leafy clumps -->
    <path d="M 40 110 Q 20 100 25 70 Q 10 40 45 35 Q 60 10 90 20 Q 110 5 140 20 Q 170 10 180 40 Q 195 65 170 95 Q 160 115 140 105"/>
    <path d="M 50 105 Q 40 120 65 125 Q 90 135 120 120 Q 135 125 145 110"/>
    
    <!-- Canopy interior detail and leaf clusters -->
    <path d="M 50 45 Q 60 25 80 35 M 100 30 Q 120 15 140 35 M 40 70 Q 55 55 75 75 M 125 75 Q 145 55 160 70 M 70 100 Q 90 85 110 100" stroke-width="1.5"/>

    <!-- Aerial Roots reaching down -->
    <path d="M 45 115 L 45 184 M 40 110 L 40 170" stroke-width="1.5"/>
    <path d="M 60 120 L 60 184 M 55 122 L 55 160" stroke-width="1.5"/>
    <path d="M 140 115 L 140 184 M 145 110 L 145 175" stroke-width="1.5"/>
    <path d="M 155 105 L 155 184 M 160 100 L 160 165" stroke-width="1.5"/>
    
    <!-- Roots weaving -->
    <path d="M 45 140 Q 50 150 60 160 M 140 130 Q 145 145 155 155" stroke-width="1.2"/>
  </g>

  <g id="accent" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Highlight raindrops hitting the canopy (stippling) -->
    <circle cx="35" cy="30" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="70" cy="15" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="110" cy="12" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="155" cy="25" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="180" cy="45" r="1.5" fill="currentColor" stroke="none"/>
    <!-- Drops falling from leaves -->
    <line x1="50" y1="130" x2="50" y2="135"/>
    <line x1="90" y1="140" x2="90" y2="145"/>
    <line x1="130" y1="130" x2="130" y2="135"/>
  </g>

  <g id="foil" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Occasional distinct raindrop -->
    <path d="M 80 160 Q 82 165 80 170 Q 78 165 80 160" fill="currentColor"/>
    <path d="M 150 150 Q 152 155 150 160 Q 148 155 150 150" fill="currentColor"/>
    <path d="M 30 165 Q 32 170 30 175 Q 28 170 30 165" fill="currentColor"/>
  </g>
</svg>