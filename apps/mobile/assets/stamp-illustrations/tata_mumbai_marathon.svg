    <path d="M 30 110 L 34 110 M 30 120 L 34 120 M 166 110 L 170 110 M 166 120 L 170 120 M 80 82 L 86 82 M 114 82 L 120 82" stroke-width="1.2"/>
  </g>

  <g id="foil" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="33" cy="8" r="2" fill="currentColor" stroke="none"/>
    <line x1="33" y1="12" x2="33" y2="10"/>
    <circle cx="73" cy="16" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="127" cy="16" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="167" cy="8" r="2" fill="currentColor" stroke="none"/>
    <line x1="167" y1="12" x2="167" y2="10"/>
  </g>
