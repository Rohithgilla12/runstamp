<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="shadow" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Busy market street suggestion with horizontal and diagonal hatching -->
    <line x1="10" y1="190" x2="190" y2="190"/>
    <path d="M 15 186 L 45 186 M 155 186 L 185 186" stroke-width="1.2"/>
    <path d="M 20 180 L 35 190 M 180 180 L 165 190" stroke-width="1"/>
  </g>

  <g id="ink" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="36" y="110" width="128" height="74"/>
    
    <!-- Main Central Arch -->
    <path d="M 70 184 L 70 140 Q 100 110 130 140 L 130 184"/>
    <!-- Arch inner detail and recessed shadow hatching -->
    <path d="M 76 184 L 76 140 Q 100 120 124 140 L 124 184"/>
    <path d="M 80 184 L 80 142 Q 100 126 120 142 L 120 184" stroke-width="1.2"/>
    <path d="M 84 184 L 84 145 M 88 184 L 88 148 M 92 184 L 92 152 M 96 184 L 96 155 M 100 184 L 100 157 M 104 184 L 104 155 M 108 184 L 108 152 M 112 184 L 112 148 M 116 184 L 116 145" stroke-width="1.2"/>

    <!-- Side Arches -->
    <path d="M 44 184 L 44 155 Q 52 145 60 155 L 60 184"/>
    <path d="M 140 184 L 140 155 Q 148 145 156 155 L 156 184"/>

    <!-- Balustrades / Upper Gallery -->
    <line x1="36" y1="110" x2="164" y2="110"/>
    <line x1="36" y1="100" x2="164" y2="100"/>
    <line x1="36" y1="90" x2="164" y2="90"/>
    
    <!-- Gallery arches -->
    <path d="M 50 100 Q 56 90 62 100 M 66 100 Q 72 90 78 100 M 82 100 Q 88 90 94 100 M 98 100 Q 104 90 110 100 M 114 100 Q 120 90 126 100 M 130 100 Q 136 90 142 100 M 146 100 Q 152 90 158 100"/>

    <!-- Central Dome -->
    <path d="M 80 90 Q 100 60 120 90"/>
    <path d="M 90 90 Q 100 70 110 90" stroke-width="1.2"/>

    <!-- Left Minaret -->
    <line x1="26" y1="184" x2="26" y2="30"/>
    <line x1="36" y1="184" x2="36" y2="30"/>
    <!-- Minaret Balconies -->
    <line x1="20" y1="140" x2="42" y2="140"/>
    <line x1="20" y1="90" x2="42" y2="90"/>
    <line x1="22" y1="50" x2="40" y2="50"/>
    <!-- Minaret details -->
    <line x1="31" y1="184" x2="31" y2="30" stroke-width="1"/>
    <!-- Dome -->
    <path d="M 22 30 Q 31 10 40 30"/>

    <!-- Right Minaret -->
    <line x1="164" y1="184" x2="164" y2="30"/>
    <line x1="174" y1="184" x2="174" y2="30"/>
    <line x1="158" y1="140" x2="180" y2="140"/>
    <line x1="158" y1="90" x2="180" y2="90"/>
    <line x1="160" y1="50" x2="178" y2="50"/>
    <line x1="169" y1="184" x2="169" y2="30" stroke-width="1"/>
    <path d="M 160 30 Q 169 10 178 30"/>
  </g>

  <g id="accent" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gallery balustrade crosses -->
    <path d="M 40 108 L 44 102 M 44 108 L 40 102" stroke-width="1"/>
    <path d="M 48 108 L 52 102 M 52 108 L 48 102" stroke-width="1"/>
    <path d="M 148 108 L 152 102 M 152 108 L 148 102" stroke-width="1"/>
    <path d="M 156 108 L 160 102 M 160 108 L 156 102" stroke-width="1"/>
  </g>

  <g id="foil" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Minaret and Dome Finials -->
    <line x1="100" y1="60" x2="100" y2="45"/>
    <circle cx="100" cy="42" r="2" fill="currentColor" stroke="none"/>
    <line x1="31" y1="15" x2="31" y2="5"/>
    <line x1="169" y1="15" x2="169" y2="5"/>
  </g>
</svg>