<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="shadow" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Serene reflecting pools -->
    <path d="M 10 188 Q 55 196 100 188 T 190 188"/>
    <path d="M 20 180 Q 55 186 100 180 T 180 180" stroke-width="1.5"/>
    <path d="M 40 194 Q 70 198 100 194 T 160 194" stroke-width="1.2"/>
  </g>

  <g id="ink" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Elevated Lotus Base -->
    <rect x="40" y="168" width="120" height="8"/>
    <rect x="30" y="176" width="140" height="4"/>

    <!-- Lotus Petals (Back layer) -->
    <path d="M 16 168 Q 10 100 50 50 Q 75 30 100 24"/>
    <path d="M 184 168 Q 190 100 150 50 Q 125 30 100 24"/>
    <!-- Hatching on back petals -->
    <path d="M 30 160 Q 25 110 55 65" stroke-width="1.2"/>
    <path d="M 170 160 Q 175 110 145 65" stroke-width="1.2"/>

    <!-- Mid layer petals -->
    <path d="M 40 168 Q 30 90 70 45 Q 85 30 100 24"/>
    <path d="M 160 168 Q 170 90 130 45 Q 115 30 100 24"/>
    <path d="M 52 168 Q 45 100 75 60" stroke-width="1.2"/>
    <path d="M 148 168 Q 155 100 125 60" stroke-width="1.2"/>

    <!-- Front layer petals -->
    <path d="M 64 168 Q 60 100 90 50 Q 96 30 100 24"/>
    <path d="M 136 168 Q 140 100 110 50 Q 104 30 100 24"/>
    <path d="M 76 168 Q 75 110 95 65" stroke-width="1.5"/>
    <path d="M 124 168 Q 125 110 105 65" stroke-width="1.5"/>

    <!-- Center core and ribbing -->
    <path d="M 100 168 L 100 24"/>
    <path d="M 90 168 Q 95 100 100 40" stroke-width="1.5"/>
    <path d="M 110 168 Q 105 100 100 40" stroke-width="1.5"/>
  </g>

  <g id="accent" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Distinctive petal tips / edges -->
    <path d="M 50 50 Q 75 30 100 24" stroke-width="2"/>
    <path d="M 150 50 Q 125 30 100 24" stroke-width="2"/>
    <path d="M 70 45 Q 85 30 100 24" stroke-width="2"/>
    <path d="M 130 45 Q 115 30 100 24" stroke-width="2"/>
  </g>

  <g id="foil" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="100" cy="18" r="3" fill="currentColor" stroke="none"/>
  </g>
</svg>