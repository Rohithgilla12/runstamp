<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g id="ink" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Reflecting pool below the temple -->
    <path d="M 26 188 Q 100 196 174 188"/>
    <path d="M 32 184 Q 100 190 168 184"/>

    <!-- Stepped plinth (the platform the lotus sits on) -->
    <line x1="46" y1="174" x2="154" y2="174"/>
    <line x1="38" y1="180" x2="162" y2="180"/>

    <!-- The lotus — nine visible petals fanning outward and meeting at the apex -->
    <!-- Outer-left petal -->
    <path d="M 22 168 Q 8 110 36 60 Q 64 32 100 28"/>
    <!-- Outer-right petal (mirror) -->
    <path d="M 178 168 Q 192 110 164 60 Q 136 32 100 28"/>

    <!-- Mid-left petal -->
    <path d="M 50 174 Q 38 110 60 60 Q 80 36 100 28"/>
    <!-- Mid-right petal (mirror) -->
    <path d="M 150 174 Q 162 110 140 60 Q 120 36 100 28"/>

    <!-- Front-left petal -->
    <path d="M 76 174 Q 70 110 86 56 Q 94 32 100 28"/>
    <!-- Front-right petal (mirror) -->
    <path d="M 124 174 Q 130 110 114 56 Q 106 32 100 28"/>

    <!-- Centre fold seam — gentle vertical line suggesting the central two petals' meeting line -->
    <line x1="100" y1="174" x2="100" y2="32"/>

    <!-- Apex / small finial detail -->
    <line x1="100" y1="28" x2="100" y2="18"/>
    <circle cx="100" cy="16" r="1.6" fill="currentColor" stroke="none"/>
  </g>
</svg>
